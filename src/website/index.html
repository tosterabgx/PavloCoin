<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PavloCoin</title>
  <!-- Add Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="game-container">
    <button class="coin-button"></button>
    
    <!-- Decorative coins -->
    <div class="coins-container">
      <img class="coin-8" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-7" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-6" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-5" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-4" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-3" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-2" src="assets/images/tails_pavlo_coin.png" />
      <img class="coin-1" src="assets/images/tails_pavlo_coin.png" />
    </div>
    
    <!-- Counter -->
    <div class="counter" id="score">0</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PavloCoin</title>
  <!-- Add Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/styles.css">
  
  <script src="static/script.js" defer></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="game-container">

    <div class="level-panel-container">
      <div class="level-panel" id="earn-per-tap">
        <div class="panel-title">Earn per tap</div>
        <div class="panel-value">1</div>  
      </div>
      <div class="level-panel" id="level-up-at">
        <div class="panel-title">Level up at</div>
        <div class="panel-value">100</div>
      </div>
      <div class="level-panel" id="current-level">
        <div class="panel-title">Current level</div>
        <div class="panel-value">1</div>
      </div>
    </div>
    
    
    
    <div class="counter" id="score">0</div>

    <div class="coins-container">
      <img class="coin-8" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-7" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-6" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-5" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-4" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-3" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-2" src="static/images/tails_pavlo_coin.png" />
      <img class="coin-1" src="static/images/tails_pavlo_coin.png" />
    </div>

    <div class="coin-button-container">
      <button class="coin-button"></button>
    </div>
    
    
  </div>
</body>
</html>
